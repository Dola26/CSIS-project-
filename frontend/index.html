<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Resume Analyzer</h1>
        <p>Compare your resume against job descriptions instantly</p>
        <button id="savedBtn" class="saved-toggle-btn">Saved Analyses</button>
    </header>

    <main class="container">
        <section class="card input-section">
            <div class="input-group">
                <label for="resumeInput">Your Resume</label>
                <textarea id="resumeInput" placeholder="Paste your resume text here..."></textarea>
            </div>

            <div class="input-group">
                <label for="jobInput">Job Description</label>
                <textarea id="jobInput" placeholder="Paste the job description here..."></textarea>
            </div>

            <button id="analyzeBtn">Analyze Resume</button>
            <p id="errorMsg" class="error hidden"></p>
        </section>

        <section id="savedSection" class="card saved-section hidden">
            <div class="saved-header">
                <h2>Saved Analyses</h2>
                <button id="refreshBtn" class="refresh-btn">Refresh</button>
            </div>
            <p id="savedError" class="error hidden"></p>
            <div id="savedList" class="saved-list"></div>
        </section>

        <section id="resultsSection" class="card results-section hidden">
            <h2>Analysis Results</h2>

            <div class="score-container">
                <h3>Match Score</h3>
                <div class="score-display">
                    <span id="matchScore">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>

            <div class="results-grid">
                <div class="result-card">
                    <h3>Detected Skills</h3>
                    <ul id="detectedSkills" class="skills-list"></ul>
                </div>

                <div class="result-card">
                    <h3>Missing Skills</h3>
                    <ul id="missingSkills" class="skills-list"></ul>
                </div>
            </div>

            <div class="result-card">
                <h3>Suggestions for Improvement</h3>
                <ul id="suggestions" class="suggestions-list"></ul>
            </div>

            <div class="result-card">
                <h3>Highlighted Resume</h3>
                <div id="highlightedResume" class="highlighted-text"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
